name: paperef
description: Manage your research references
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.2
  
  # HTTP & API
  http: ^1.2.0
  
  # Secure Storage
  flutter_secure_storage: ^9.2.2
  flutter_secure_storage_web: ^1.2.1 
  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1 
  
  # Utilities
  intl: ^0.19.0
  dropdown_button2: ^2.3.9
  web: ^1.1.1
  flutter_linkify: ^6.0.0
  url_launcher: ^6.2.5
  app_links: ^7.0.0
     
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4


flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    
flutter_launcher_icons:
  ios: true
  android: false                     
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true            
  background_color_ios: "#FFFFFF"